<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klientský přehled objednávek</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: #f3f4f6; color: #333; display: flex; justify-content: center; padding: 20px; }
        
        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        h1 { font-size: 1.5rem; text-align: center; margin-bottom: 25px; color: #111; }

        .order-btn {
            display: block; width: 100%; text-align: left;
            background-color: #f8fafc; border: 1px solid #e2e8f0;
            padding: 15px; margin-bottom: 10px; border-radius: 8px;
            cursor: pointer; transition: background 0.2s;
        }
        .order-btn:hover { background-color: #f1f5f9; }
        .order-btn-title { font-weight: bold; font-size: 1.1rem; color: #0f172a; margin-bottom: 5px; }
        .order-btn-date { font-size: 0.85rem; color: #64748b; }

        .divider-line {
            text-align: center; border-bottom: 2px dashed #cbd5e1;
            line-height: 0.1em; margin: 30px 0 20px;
        }
        .divider-line span { background: #fff; padding: 0 10px; color: #64748b; font-size: 0.9rem; font-weight: bold;}

        /* Překryvné okno - Detail */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.6); display: none;
            justify-content: center; align-items: center; z-index: 1000; padding: 20px;
        }

        .modal-content {
            background-color: white; padding: 30px; border-radius: 12px;
            width: 100%; max-width: 500px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .modal-header {
            display: flex; align-items: center; margin-bottom: 20px;
            padding-bottom: 15px; border-bottom: 1px solid #e5e7eb;
        }

        .btn-back {
            background: none; border: none; font-size: 1.2rem;
            cursor: pointer; margin-right: 15px; color: #0056b3; padding: 5px;
        }

        .detail-field { margin-bottom: 20px; }
        .detail-field label { display: block; font-size: 0.9rem; color: #64748b; margin-bottom: 5px; }
        
        /* Zobrazení hodnot jako text (read-only) */
        .readonly-value {
            font-size: 1.1rem;
            font-weight: bold;
            color: #0f172a;
            word-break: break-all;
        }

        .readonly-link {
            font-size: 1.1rem;
            color: #0056b3;
            text-decoration: underline;
            word-break: break-all;
        }
        .readonly-link:hover { color: #003d82; }

    </style>
</head>
<body>

    <div class="container">
        <h1>BSCOM objednávky wrapů CD-R</h1>
        
        <div id="orders-incomplete-list"></div>
        <h2 class="divider-line"><span>Dokončené objednávky</span></h2>
        <div id="orders-complete-list"></div>
    </div>

    <div class="modal-overlay" id="modal-order-detail">
        <div class="modal-content">
            <div class="modal-header">
                <button class="btn-back" id="btn-back-to-list">←</button>
                <div style="display:flex; flex-direction:column">
                    <h2 id="detail-title-qty" style="font-size:1.3rem; margin:0;">Počet kusů: X</h2>
                    <span style="font-size:0.85rem; color:#64748b" id="detail-title-date">Datum a čas: Y</span>
                </div>
            </div>
            
            <div class="detail-field">
                <label>Číslo objednávky:</label>
                <div class="readonly-value" id="val-orderno"></div>
            </div>
            <div class="detail-field">
                <label>Číslo faktury:</label>
                <div class="readonly-value" id="val-invoiceno"></div>
            </div>
            <div class="detail-field">
                <label>Odkaz na fakturu:</label>
                <div id="val-link-container">
                    <a href="#" target="_blank" class="readonly-link" id="val-link"></a>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDdC6RSU08MjH0GoREf6WJuWXUtrQ2Y-_I",
            authDomain: "bscom-objednavky.firebaseapp.com",
            databaseURL: "https://bscom-objednavky-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bscom-objednavky",
            storageBucket: "bscom-objednavky.firebasestorage.app",
            messagingSenderId: "1009724650256",
            appId: "1:1009724650256:web:e93203e9280f6081fbeb95"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const ordersIncompleteList = document.getElementById('orders-incomplete-list');
        const ordersCompleteList = document.getElementById('orders-complete-list');
        const modalOrderDetail = document.getElementById('modal-order-detail');
        const btnBackToList = document.getElementById('btn-back-to-list');
        
        const detailTitleQty = document.getElementById('detail-title-qty');
        const detailTitleDate = document.getElementById('detail-title-date');
        const valOrderNo = document.getElementById('val-orderno');
        const valInvoiceNo = document.getElementById('val-invoiceno');
        const valLink = document.getElementById('val-link');
        const valLinkContainer = document.getElementById('val-link-container');

        let allOrders = {};

        const ordersRef = ref(db, 'Objednavky');
        onValue(ordersRef, (snapshot) => {
            allOrders = snapshot.val() || {};
            let ordersArray = [];

            for (const key in allOrders) {
                const order = allOrders[key];
                order.id = key;
                ordersArray.push(order);
            }

            // Sestupné řazení (nejnovější nahoře)
            ordersArray.sort((a, b) => b.timestamp - a.timestamp);

            ordersIncompleteList.innerHTML = '';
            ordersCompleteList.innerHTML = '';

            ordersArray.forEach(order => {
                const btn = document.createElement('div');
                btn.className = 'order-btn';
                btn.innerHTML = `
                    <div class="order-btn-title">Počet kusů: ${order.pocet_kusu}</div>
                    <div class="order-btn-date">Datum a čas: ${order.datum} ${order.cas}</div>
                `;
                btn.onclick = () => openOrderDetail(order.id);

                if (order.objednavka_cislo && order.faktura && order.faktura_odkaz) {
                    ordersCompleteList.appendChild(btn);
                } else {
                    ordersIncompleteList.appendChild(btn);
                }
            });

            if (ordersCompleteList.innerHTML === '') ordersCompleteList.innerHTML = '<p style="text-align:center; color:#94a3b8">Zatím žádné dokončené objednávky.</p>';
            if (ordersIncompleteList.innerHTML === '') ordersIncompleteList.innerHTML = '<p style="text-align:center; color:#94a3b8">Vše hotovo.</p>';
        });

        function openOrderDetail(id) {
            const order = allOrders[id];
            if(!order) return;
            
            detailTitleQty.textContent = `Počet kusů: ${order.pocet_kusu}`;
            detailTitleDate.textContent = `Datum a čas: ${order.datum} ${order.cas}`;
            
            valOrderNo.textContent = order.objednavka_cislo || 'Nevyplněno';
            valInvoiceNo.textContent = order.faktura || 'Nevyplněno';
            
            if (order.faktura_odkaz) {
                valLink.href = order.faktura_odkaz;
                valLink.textContent = order.faktura_odkaz;
                valLink.style.display = 'inline';
            } else {
                valLink.style.display = 'none';
                const emptySpan = document.createElement('span');
                emptySpan.textContent = 'Nevyplněno';
                emptySpan.className = 'readonly-value';
                
                // Clear container and add span
                valLinkContainer.innerHTML = '';
                valLinkContainer.appendChild(emptySpan);
                valLinkContainer.appendChild(valLink); // Keep hidden link element for later use
            }

            modalOrderDetail.style.display = 'flex';
        }

        btnBackToList.addEventListener('click', () => {
            modalOrderDetail.style.display = 'none';
        });

    </script>
</body>
</html>
